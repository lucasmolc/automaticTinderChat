{% extends "base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Dashboard</h1>
        <p class="text-muted mb-0">Visão geral do sistema de automação</p>
    </div>
    <div class="d-flex gap-2">
        <!-- Dispara o evento 'refresh' que todos os containers HTMX escutam -->
        <button class="btn btn-outline-secondary"
                onclick="document.body.dispatchEvent(new Event('refresh'))">
            <i class="bi bi-arrow-clockwise"></i> Atualizar
        </button>
    </div>
</div>

<!-- Stat Cards (HTMX: carrega no load, a cada 30s e no botão Atualizar) -->
<div id="stats-container"
     hx-get="/fragments/stats"
     hx-trigger="load, every 30s, refresh from:body"
     hx-swap="innerHTML">
    <div class="loading-spinner py-4">
        <div class="spinner-border" role="status"></div>
    </div>
</div>

<!-- Recent Activity -->
<div class="row g-4">
    <!-- Recent Matches -->
    <div class="col-12 col-lg-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="bi bi-people me-2"></i>Matches Recentes
                </h6>
                <a href="/matches" class="btn btn-sm btn-outline-secondary">Ver todos</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Match</th>
                                <th>Status</th>
                                <th>Data</th>
                            </tr>
                        </thead>
                        <tbody id="recent-matches"
                               hx-get="/fragments/recent-matches"
                               hx-trigger="load, every 30s, refresh from:body"
                               hx-swap="innerHTML">
                            <tr>
                                <td colspan="3">
                                    <div class="loading-spinner">
                                        <div class="spinner-border" role="status"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Messages -->
    <div class="col-12 col-lg-6">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6 class="mb-0">
                    <i class="bi bi-chat-dots me-2"></i>Mensagens Recentes
                </h6>
                <a href="/messages" class="btn btn-sm btn-outline-secondary">Ver todas</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>De</th>
                                <th>Mensagem</th>
                                <th>Quando</th>
                            </tr>
                        </thead>
                        <tbody id="recent-messages"
                               hx-get="/fragments/recent-messages"
                               hx-trigger="load, every 30s, refresh from:body"
                               hx-swap="innerHTML">
                            <tr>
                                <td colspan="3">
                                    <div class="loading-spinner">
                                        <div class="spinner-border" role="status"></div>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
