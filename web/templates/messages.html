{% extends "base.html" %}

{% block title %}Mensagens{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Mensagens</h1>
        <p class="text-muted mb-0">Histórico de mensagens enviadas por IA</p>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary" onclick="loadMessages()">
            <i class="bi bi-arrow-clockwise"></i> Atualizar
        </button>
    </div>
</div>

<!-- Messages List -->
<div class="card">
    <div class="card-header">
        <h6 class="mb-0"><i class="bi bi-robot me-2"></i>Mensagens Geradas por IA</h6>
    </div>
    <div class="card-body p-0">
        <div id="messages-list">
            <div class="loading-spinner">
                <div class="spinner-border" role="status"></div>
            </div>
        </div>
    </div>
</div>

<!-- Load More -->
<div class="text-center mt-4">
    <button class="btn btn-outline-secondary" id="btn-load-more" onclick="loadMoreMessages()">
        <i class="bi bi-arrow-down"></i> Carregar mais
    </button>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let messagesOffset = 0;
    const messagesLimit = 30;
    
    document.addEventListener('DOMContentLoaded', function() {
        loadMessages();
    });
    
    async function loadMessages() {
        messagesOffset = 0;
        
        try {
            const response = await fetch(`/api/messages/ai?limit=${messagesLimit}`);
            const result = await response.json();
            
            const container = document.getElementById('messages-list');
            
            if (result.success && result.data.length > 0) {
                container.innerHTML = result.data.map(msg => createMessageCard(msg)).join('');
            } else {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="bi bi-robot"></i>
                        <p>Nenhuma mensagem de IA encontrada</p>
                    </div>
                `;
            }
        } catch (error) {
            console.error('Erro ao carregar mensagens:', error);
        }
    }
    
    async function loadMoreMessages() {
        messagesOffset += messagesLimit;
        
        try {
            const response = await fetch(`/api/messages/ai?limit=${messagesLimit}&offset=${messagesOffset}`);
            const result = await response.json();
            
            const container = document.getElementById('messages-list');
            
            if (result.success && result.data.length > 0) {
                result.data.forEach(msg => {
                    container.insertAdjacentHTML('beforeend', createMessageCard(msg));
                });
            } else {
                document.getElementById('btn-load-more').disabled = true;
                document.getElementById('btn-load-more').textContent = 'Não há mais mensagens';
            }
        } catch (error) {
            console.error('Erro ao carregar mais mensagens:', error);
        }
    }
    
    function getMessageTypeBadge(type) {
        switch(type) {
            case 'first_message':
                return '<span class="badge bg-info bg-opacity-10 text-info"><i class="bi bi-chat-dots me-1"></i>Primeira mensagem</span>';
            case 'response':
                return '<span class="badge bg-success bg-opacity-10 text-success"><i class="bi bi-reply me-1"></i>Resposta</span>';
            case 'response_dry_run':
            case 'first_message_dry_run':
                return '<span class="badge bg-warning bg-opacity-10 text-warning"><i class="bi bi-eye me-1"></i>Simulação</span>';
            default:
                return '<span class="badge bg-secondary bg-opacity-10 text-secondary"><i class="bi bi-robot me-1"></i>IA</span>';
        }
    }
    
    function createMessageCard(msg) {
        return `
            <div class="d-flex align-items-start gap-3 p-3 border-bottom border-start border-4 ${msg.message_type === 'first_message' ? 'border-info' : 'border-success'} fade-in">
                ${msg.match.photo_url 
                    ? `<img src="${msg.match.photo_url}" class="match-avatar" alt="${msg.match.name}" 
                        onerror="this.outerHTML='<div class=\\'match-avatar placeholder\\'><i class=\\'bi bi-person\\'></i></div>'">`
                    : `<div class="match-avatar placeholder"><i class="bi bi-person"></i></div>`
                }
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <span class="fw-medium">Você → ${msg.match.name}</span>
                        <small class="text-muted">${formatRelativeTime(msg.sent_at)}</small>
                    </div>
                    <p class="mb-0 text-muted">${msg.content}</p>
                    ${getMessageTypeBadge(msg.message_type)}
                </div>
            </div>
        `;
    }
</script>
{% endblock %}
